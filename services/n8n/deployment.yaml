apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: n8n
        image: docker.io/n8nio/n8n:2.10.4
        env:
        - name: DB_TYPE
          value: sqlite
        - name: DB_SQLITE_DATABASE
          value: /home/node/.n8n/database.sqlite
        - name: GENERIC_TIMEZONE
          value: America/Detroit
        - name: N8N_EDITOR_BASE_URL
          value: https://n8n.mattshan.dev
        - name: N8N_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: n8n-secret
              key: N8N_ENCRYPTION_KEY
        - name: N8N_HOST
          value: n8n.mattshan.dev
        - name: N8N_PORT
          value: "5678"
        - name: N8N_PROTOCOL
          value: https
        - name: N8N_PROXY_HOPS
          value: "1"
        - name: N8N_SECURE_COOKIE
          value: "true"
        - name: TZ
          value: America/Detroit
        - name: WEBHOOK_URL
          value: https://n8n.mattshan.dev
        ports:
        - name: http
          containerPort: 5678
        volumeMounts:
        - name: n8n-data
          mountPath: /home/node/.n8n
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      volumes:
      - name: n8n-data
        persistentVolumeClaim:
          claimName: n8n-data