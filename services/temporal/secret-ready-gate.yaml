apiVersion: v1
kind: ServiceAccount
metadata:
  name: temporal-secret-ready-gate
  namespace: temporal
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: temporal-secret-ready-gate
  namespace: temporal
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: temporal-secret-ready-gate
  namespace: temporal
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
subjects:
  - kind: ServiceAccount
    name: temporal-secret-ready-gate
    namespace: temporal
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: temporal-secret-ready-gate
---
apiVersion: batch/v1
kind: Job
metadata:
  name: temporal-secret-ready-gate
  namespace: temporal
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccountName: temporal-secret-ready-gate
      restartPolicy: Never
      containers:
        - name: wait-for-temporal-db-secret
          image: bitnami/kubectl:1.34.1
          imagePullPolicy: IfNotPresent
          env:
            - name: WAIT_TIMEOUT_SECONDS
              value: "600"
          command:
            - /bin/sh
            - -c
            - |-
              kubectl -n temporal wait --for=condition=Ready externalsecret/temporal-db --timeout="${WAIT_TIMEOUT_SECONDS}s"
              kubectl -n temporal get secret temporal-db >/dev/null 2>&1 || {
                echo "Error: Secret temporal-db not found after ExternalSecret became Ready"
                exit 1
              }
