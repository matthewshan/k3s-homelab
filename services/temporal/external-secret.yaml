apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: temporal-db
  namespace: temporal
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: temporal-db
    creationPolicy: Owner
  data:
    # Used by Temporal server when it connects as the `temporal` user to the shared PostgreSQL service.
    - secretKey: postgres-temporal-user-password
      remoteRef:
        key: postgres-temporal-user-password
