apiVersion: v1
kind: ConfigMap
metadata:
  name: pc-broker-config
  namespace: pc-broker
data:
  # IP/broadcast of the gaming PC's LAN. Use the PC's static DHCP reservation.
  PC_HOST: "192.168.1.100"
  PC_BROADCAST: "192.168.1.255"
  # The shutdown agent running on the PC (agent/ in the pc-broker repo).
  SHUTDOWN_AGENT_URL: "http://192.168.1.100:8001"
  HOST_REACHABILITY_TIMEOUT: "300"
  POLL_INTERVAL: "5"
