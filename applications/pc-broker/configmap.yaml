apiVersion: v1
kind: ConfigMap
metadata:
  name: pc-broker-config
  namespace: pc-broker
data:
  # IP/broadcast of the gaming PC's LAN. Use the PC's static DHCP reservation.
  PC_HOST: "192.168.1.77"
  PC_BROADCAST: "192.168.1.255"
  # The shutdown agent running on the PC (agent/ in the pc-broker repo).
  SHUTDOWN_AGENT_URL: "http://192.168.1.77:8001"
  HOST_REACHABILITY_TIMEOUT: "300"
  POLL_INTERVAL: "5"
  # Idle auto-shutdown is OFF by default in the broker; without this the PC
  # stays on all day after a briefing wake. Thresholds use the broker defaults
  # (30 min LLM idle, 20 min user-input idle, 2 strikes, 15 min post-wake grace).
  IDLE_SHUTDOWN_ENABLED: "true"
