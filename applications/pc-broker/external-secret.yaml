apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pc-broker-secrets
  namespace: pc-broker
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: pc-broker-secrets
    creationPolicy: Owner
  data:
    # MAC of the gaming PC's NIC, used for the Wake-on-LAN magic packet.
    # Kept out of this public repo.
    - secretKey: PC_MAC
      remoteRef:
        key: pc-broker-mac
    # Shared bearer token the broker sends to the shutdown agent on the PC.
    # Must match SHUTDOWN_AGENT_TOKEN passed to agent/install.ps1.
    - secretKey: SHUTDOWN_AGENT_TOKEN
      remoteRef:
        key: pc-broker-shutdown-agent-token
