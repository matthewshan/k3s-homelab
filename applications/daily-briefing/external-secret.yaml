apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: briefing-secrets
  namespace: daily-briefing
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: briefing-secrets
    creationPolicy: Owner
  data:
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: gemini-api-key
    - secretKey: GNEWS_API_KEY
      remoteRef:
        key: gnews-api-key
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: discord-bot-token
    - secretKey: DISCORD_BOT_CHANNEL_ID
      remoteRef:
        key: discord-channel-id
    - secretKey: GOOGLE_CALENDAR_ID
      remoteRef:
        key: google-calendar-id
    - secretKey: GOOGLE_SERVICE_ACCOUNT_JSON_BASE64
      remoteRef:
        key: google-service-account-json-base64
    - secretKey: SUPABASE_URL
      remoteRef:
        key: supabase-url
    - secretKey: SUPABASE_SERVICE_ROLE_KEY
      remoteRef:
        key: supabase-service-role-key
    - secretKey: GITHUB_API_KEY
      remoteRef:
        key: github-api-key
