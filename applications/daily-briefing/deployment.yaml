apiVersion: apps/v1
kind: Deployment
metadata:
  name: daily-briefing
  namespace: daily-briefing
  labels:
    app.kubernetes.io/name: daily-briefing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: daily-briefing
  strategy:
    type: Recreate  # Only one replica — Recreate avoids two bots online simultaneously
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daily-briefing
    spec:
      containers:
        - name: daily-briefing
          image: ghcr.io/matthewshan/daily-briefing-bot:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: briefing-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
      restartPolicy: Always
