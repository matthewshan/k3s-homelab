apiVersion: apps/v1
kind: Deployment
metadata:
  name: daily-briefing
  namespace: daily-briefing
  labels:
    app.kubernetes.io/name: daily-briefing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: daily-briefing
  strategy:
    type: Recreate  # Only one replica — Recreate avoids two bots online simultaneously
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daily-briefing
    spec:
      containers:
        - name: daily-briefing
          image: ghcr.io/matthewshan/daily-briefing-bot:latest@sha256:b1af08d1586ea751401fda6594e1fdf6f5ae3562e79b635e554f3faaa26e5428
          imagePullPolicy: IfNotPresent
          env:
            - name: BACKEND
              value: github
            - name: GITHUB_MODEL
              value: gpt-4.1
          envFrom:
            - secretRef:
                name: briefing-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
      restartPolicy: Always
