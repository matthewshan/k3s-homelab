apiVersion: apps/v1
kind: Deployment
metadata:
  name: daily-briefing
  namespace: daily-briefing
  labels:
    app.kubernetes.io/name: daily-briefing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: daily-briefing
  strategy:
    type: Recreate  # Only one replica — Recreate avoids two bots online simultaneously
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daily-briefing
    spec:
      containers:
        - name: daily-briefing
          image: ghcr.io/matthewshan/daily-briefing-bot:sha-d5f640d
          imagePullPolicy: IfNotPresent
          env:
            # Local LLM: gaming-PC Ollama fronted by pc-broker (same cluster).
            # Requires pc-broker >= 0.3.1 (Ollama-compatible /api/chat alias).
            - name: BACKEND
              value: ollama
            - name: OLLAMA_API_BASE
              value: http://pc-broker-service.pc-broker.svc.cluster.local:8000
            - name: OLLAMA_MODEL
              value: qwen3.5:9b
            # Wake-before-run: bot POSTs /api/power/on and polls /api/status.
            - name: PC_BROKER_URL
              value: http://pc-broker-service.pc-broker.svc.cluster.local:8000
            # Two full broker wake windows (300s each) — survives one lost
            # WoL packet + broker timeout + retry (2026-07-16 briefing outage).
            - name: PC_BROKER_WAKE_TIMEOUT
              value: "600"
          envFrom:
            - secretRef:
                name: briefing-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
      restartPolicy: Always
