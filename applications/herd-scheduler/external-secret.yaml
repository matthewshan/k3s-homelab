apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: herd-scheduler-secrets
  namespace: herd-scheduler
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: herd-scheduler-secrets
    creationPolicy: Owner
  data:
    # Postgres on the LAN VM (provisioned via ansible/postgres-vm), e.g.
    # postgresql://herd:<password>@<vm-ip>:5432/scheduler
    - secretKey: DATABASE_URL
      remoteRef:
        key: herd-scheduler-database-url
    - secretKey: AUTH_SECRET
      remoteRef:
        key: herd-scheduler-auth-secret
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: herd-scheduler-google-client-id
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: herd-scheduler-google-client-secret
    # Not sensitive in the cluster, but kept out of this public repo.
    - secretKey: OWNER_EMAIL
      remoteRef:
        key: herd-scheduler-owner-email
