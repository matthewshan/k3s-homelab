apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-agent
  namespace: adk-agent
  labels:
    app.kubernetes.io/name: adk-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adk-agent
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adk-agent
    spec:
      containers:
        - name: adk-agent
          image: ghcr.io/matthewshan/daily-briefing-dev:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: adk-agent-secrets
          env:
            - name: BACKEND
              value: gemini
            - name: GEMINI_MODEL
              value: gemini-2.5-flash-lite
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
