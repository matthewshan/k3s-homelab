apiVersion: twingate.com/v1beta
kind: TwingateResource
metadata:
  name: apps
  namespace: twingate
spec:
  name: apps
  address: "*.mattshan.dev"
  isBrowserShortcutEnabled: false
  protocols:
    allowIcmp: false
    tcp:
      policy: RESTRICTED
      ports:
        - start: 80
          end: 80
        - start: 443
          end: 443
    udp:
      policy: RESTRICTED
---
