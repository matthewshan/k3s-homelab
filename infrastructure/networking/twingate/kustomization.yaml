apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ns.yaml
  - operator-auth.yaml
  - connector.yaml
  - groups.yaml
  - resources.yaml
  - resource-access.yaml

helmCharts:
  - name: twingate-operator
    repo: oci://ghcr.io/twingate/helmcharts
    version: 1.0.1
    releaseName: twingate-operator
    namespace: twingate
    includeCRDs: true
    valuesFile: values.yaml
