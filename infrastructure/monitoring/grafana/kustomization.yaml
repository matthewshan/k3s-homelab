apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ns.yaml

helmCharts:
  - name: k8s-monitoring
    repo: https://grafana.github.io/helm-charts
    version: 3.8.1
    releaseName: grafana-k8s-monitoring
    namespace: monitoring
    includeCRDs: true
    valuesFile: values.yaml