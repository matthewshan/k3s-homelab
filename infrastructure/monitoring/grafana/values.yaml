cluster:
  name: k3s-homelab

destinations:
  - name: grafana-cloud-metrics
    type: prometheus
    url: https://prometheus-prod-56-prod-us-east-2.grafana.net/api/prom/push
    auth:
      type: basic
      usernameKey: metricsUsername
      passwordKey: password
    secret:
      create: false
      name: grafana-cloud-auth-grafana-k8s-monitoring
      namespace: monitoring
  - name: grafana-cloud-logs
    type: loki
    url: https://logs-prod-036.grafana.net/loki/api/v1/push
    auth:
      type: basic
      usernameKey: logsUsername
      passwordKey: password
    secret:
      create: false
      name: grafana-cloud-auth-grafana-k8s-monitoring
      namespace: monitoring
  - name: gc-otlp-endpoint
    type: otlp
    url: https://otlp-gateway-prod-us-east-2.grafana.net/otlp
    protocol: http
    auth:
      type: basic
      usernameKey: otlpUsername
      passwordKey: password
    secret:
      create: false
      name: grafana-cloud-auth-grafana-k8s-monitoring
      namespace: monitoring
    metrics:
      enabled: true
    logs:
      enabled: true
    traces:
      enabled: true

clusterMetrics:
  enabled: true
  cadvisor:
    metricsTuning:
      excludeNamespaces:
        - argocd
        - longhorn-system
        - twingate
  kube-state-metrics:
    namespacesDenylist:
      - argocd
      - longhorn-system
      - twingate
  opencost:
    enabled: false
    metricsSource: grafana-cloud-metrics
    opencost:
      exporter:
        defaultClusterId: k3s-homelab
      prometheus:
        existingSecretName: grafana-cloud-auth-grafana-k8s-monitoring
        username_key: metricsUsername
        external:
          url: https://prometheus-prod-56-prod-us-east-2.grafana.net/api/prom
  kepler:
    enabled: false

clusterEvents:
  enabled: true
  excludeNamespaces:
    - argocd
    - longhorn-system
    - twingate

podLogs:
  enabled: true
  excludeNamespaces:
    - argocd
    - longhorn-system
    - twingate
  extraLogProcessingStages: |
    stage.match {
      selector = "{namespace=\"temporal\"} |= \"/healthz\" |= \"kube-probe\""
      action = "drop"
      drop_counter_reason = "temporal_healthz_probe_noise"
    }

    stage.match {
      selector = "{namespace=\"temporal\"} |~ \"(Started|Stopped) physicalTaskQueueManager\""
      action = "drop"
      drop_counter_reason = "temporal_matching_taskqueue_churn"
    }

    stage.match {
      selector = "{namespace=\"kube-system\", container=\"cilium-agent\"} |~ \"level=info\" |~ \"(regenerating all endpoints|Auto-detected local ports|Releasing key|Removed endpoint|Delete endpoint by containerID)\""
      action = "drop"
      drop_counter_reason = "cilium_agent_endpoint_churn"
    }

    stage.match {
      selector = "{namespace=\"kube-system\", container=\"cilium-operator\"} |~ \"v1 Endpoints is deprecated\""
      action = "drop"
      drop_counter_reason = "cilium_operator_endpoints_deprecation"
    }

    stage.match {
      selector = "{namespace=\"monitoring\"} |~ \"helm.controller\" |~ \"Reconciled release\""
      action = "drop"
      drop_counter_reason = "alloy_helm_reconcile_noise"
    }

    stage.match {
      selector = "{namespace=\"monitoring\"} |~ \"(tail routine (started|exited)|stopped tailing file)\""
      action = "drop"
      drop_counter_reason = "alloy_tail_routine_noise"
    }

    stage.match {
      selector = "{namespace=\"monitoring\"} |~ \"rejoining peers\" |~ \"service=cluster\""
      action = "drop"
      drop_counter_reason = "alloy_cluster_gossip_noise"
    }

    stage.match {
      selector = "{namespace=\"external-secrets\"} |~ \"(injecting ca certificate|updating webhook config)\""
      action = "drop"
      drop_counter_reason = "external_secrets_webhook_cert_noise"
    }

    stage.match {
      selector = "{job=~\".+\"} |~ \"\\\"kube-probe/[0-9.]+\\\"\""
      action = "drop"
      drop_counter_reason = "kube_probe_http_access_log_noise"
    }

applicationObservability:
  enabled: true
  receivers:
    otlp:
      grpc:
        enabled: true
        port: 4317
      http:
        enabled: true
        port: 4318
    zipkin:
      enabled: true
      port: 9411

alloy-metrics:
  enabled: true
  remoteConfig:
    enabled: true
    url: https://fleet-management-prod-008.grafana.net
    auth:
      type: basic
      usernameKey: otlpUsername
      passwordKey: password
    secret:
      create: false
      name: grafana-cloud-auth-grafana-k8s-monitoring
      namespace: monitoring

alloy-singleton:
  enabled: true
  remoteConfig:
    enabled: true
    url: https://fleet-management-prod-008.grafana.net
    auth:
      type: basic
      usernameKey: otlpUsername
      passwordKey: password
    secret:
      create: false
      name: grafana-cloud-auth-grafana-k8s-monitoring
      namespace: monitoring

alloy-logs:
  enabled: true
  remoteConfig:
    enabled: false
    url: https://fleet-management-prod-008.grafana.net
    auth:
      type: basic
      usernameKey: otlpUsername
      passwordKey: password
    secret:
      create: false
      name: grafana-cloud-auth-grafana-k8s-monitoring
      namespace: monitoring

alloy-receiver:
  enabled: true
  remoteConfig:
    enabled: true
    url: https://fleet-management-prod-008.grafana.net
    auth:
      type: basic
      usernameKey: otlpUsername
      passwordKey: password
    secret:
      create: false
      name: grafana-cloud-auth-grafana-k8s-monitoring
      namespace: monitoring
