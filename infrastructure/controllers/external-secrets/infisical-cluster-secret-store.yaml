apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      hostAPI: https://app.infisical.com/api
      auth:
        universalAuthCredentials:
          clientId:
            secretRef:
              name: infisical-universal-auth
              namespace: external-secrets
              key: clientId
          clientSecret:
            secretRef:
              name: infisical-universal-auth
              namespace: external-secrets
              key: clientSecret
