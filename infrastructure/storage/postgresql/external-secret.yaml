apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-auth
  namespace: postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: postgresql-auth
    creationPolicy: Owner
  data:
    # Used by the chart-created `temporal` application user.
    - secretKey: postgres-temporal-user-password
      remoteRef:
        key: postgres-temporal-user-password
    # Used by the Bitnami PostgreSQL chart for the built-in `postgres` admin user.
    - secretKey: postgres-password
      remoteRef:
        key: postgres-admin-password
