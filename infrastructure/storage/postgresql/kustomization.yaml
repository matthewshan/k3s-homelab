apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: postgresql

resources:
  - namespace.yaml
  - external-secret.yaml

helmCharts:
  - name: postgresql
    repo: https://charts.bitnami.com/bitnami
    version: "18.6.6"
    releaseName: postgresql
    namespace: postgresql
    valuesFile: values.yaml
